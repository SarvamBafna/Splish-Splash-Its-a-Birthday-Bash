        <div id="form">
            <h2>RSVP</h2>

        <form action = "https://formsubmit.co/garimabafna@gmail.com" method="POST">
        <label for ="name">Child's Name:</label>       
        <input type ="text"
               id="name"
               placeholder="Name"
               name="name"
               required
                      ></input>                               
         <br>

         <br>

             <label for ="email">Email:</label>
        <input type ="email"
               id="email"
               placeholder="email"
               name="email"
               required
                      ></input>
                      <br>

                      <br>
    
                      

                      <input type="radio" name="party" id="yes" value="attend" required></input>
                      <label>Will attend the party</label>
                      
                      <input type="radio" name="party" id="no" value="not attend" required></input>
                      <label>Will not attend party</label>
                      <br>

                      <br>
                      <label for="message">Do you have some special message for Sarvam ?</label>
                      <br>

                      <br>
                      <textarea id="message" name="message" placeholder="Write your wishes for Sarvam here" required rows="5"></textarea>

         <br>

         <br>
     <button type = "submit">Submit</button>
        </form>
